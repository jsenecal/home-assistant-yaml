                entity: sensor.living_room_ths_humidity
                name: Humidity
                variables:
                  lower_bound: ~0
                  upper_bound: ~100

              - type: 'custom:button-card'
                template:
                  - live_tile_card
                  - live_tile_with_long_state
                entity: sensor.thermal_comfort_living_room_humidex_perception
                name: Comfort
                state_display: '[[[ return entity.state.replace(/_/g, " ") ]]]'
                view_layout:
                  grid-column: span 2

