            template: light_button_card_group
            entity: light.living_room
            name: Living Room

          - type: 'custom:button-card'
            template: light_button_card
            entity: light.living_room_1
            name: Zone 1

          - type: 'custom:button-card'
            template: light_button_card
            entity: light.living_room_2
            name: Zone 2

          # [Great Room]

