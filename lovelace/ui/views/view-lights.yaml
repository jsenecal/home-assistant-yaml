title: Light
path: lights
icon: 'mdi:lightbulb-group'
type: 'custom:grid-layout'
layout: !include ../shared/snippets/layout-page-margin.yaml
cards:
  - type: 'custom:layout-card'
    layout_type: 'custom:grid-layout'
    layout: !include ../shared/snippets/layout-page-columns.yaml
    view_layout:
      grid-area: cc
    cards:

      - type: 'custom:layout-card'
        layout_type: 'custom:grid-layout'
        layout: !include ../shared/snippets/layout-page-title.yaml
        view_layout:
          grid-column: 1/-1
        cards:
          - type: markdown
            style: !include ../shared/snippets/style-markdown-page-title.yaml
            content: >
              # Light

              {{ states.light | length }} lights total,
              {{ states.light | selectattr('state', 'equalto', 'on') | list | length }} on.

      - type: 'custom:layout-card'
        layout_type: 'custom:grid-layout'
        layout: !include ../shared/snippets/layout-live-tile.yaml
        view_layout:
          grid-column: 1/-1
        cards:

          # [Kitchen]

          - type: 'custom:button-card'
            template: header_card_no_link
            variables:
              name: KITCHEN
            view_layout:
              grid-column: 1/-1

          - type: 'custom:button-card'
            template: light_button_card_group
            entity: light.kitchen
            name: Kitchen

          - type: 'custom:button-card'
            template: light_button_card
            entity: light.kitchen_island
            name: Island

          - type: 'custom:button-card'
            template: light_button_card
            entity: light.wled_kitchen_counters
            name: Countertop

          # [Living Room]

