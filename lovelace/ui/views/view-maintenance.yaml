title: Maintenance
path: maintenance
icon: 'mdi:wrench'
type: 'custom:grid-layout'
layout: !include ../shared/snippets/layout-page-margin.yaml
cards:
  - type: 'custom:layout-card'
    layout_type: 'custom:grid-layout'
    layout: !include ../shared/snippets/layout-page-columns.yaml
    view_layout:
      grid-area: cc
    cards:

      - type: 'custom:layout-card'
        layout_type: 'custom:grid-layout'
        layout: !include ../shared/snippets/layout-page-title.yaml
        view_layout:
          grid-column: 1/-1
        cards:
          - type: markdown
            style: !include ../shared/snippets/style-markdown-page-title.yaml
            content: >
              # Maintenance

      # [Column] Alerts

      - type: 'custom:layout-card'
        layout_type: 'custom:grid-layout'
        layout: !include ../shared/snippets/layout-live-tile.yaml
        cards:
          - type: 'custom:button-card'
            template: header_card_no_link
            variables:
              name: ALERTS
            view_layout:
              grid-column: 1/-1
          - type: 'custom:button-card'
            template: live_tile
            entity: binary_sensor.front_door_lock_replace_battery_soon
            name: Lock Batt Soon
            icon: mdi:battery-low
          - type: 'custom:button-card'
            template: live_tile
            entity: binary_sensor.front_door_lock_replace_battery_now
            name: Lock Batt Now
            icon: mdi:battery-alert
          - type: 'custom:button-card'
            template: live_tile
            entity: binary_sensor.siren_replace_battery_soon
            name: Siren Battery
            icon: mdi:battery-low
          - type: 'custom:button-card'
            template: live_tile
            entity: binary_sensor.smoke_co_detector_low_battery_level
            name: Smoke Batt
            icon: mdi:battery-low
          - type: 'custom:button-card'
            template: live_tile
            entity: binary_sensor.smoke_co_detector_replacement_required_end_of_life
            name: Detector EOL
            icon: mdi:smoke-detector-off
          - type: 'custom:button-card'
            template: live_tile
            entity: binary_sensor.laundry_room_replace_filter
            name: Replace Filter
            icon: mdi:air-filter

      # [Column] Locks & Security

      - type: 'custom:layout-card'
        layout_type: 'custom:grid-layout'
        layout: !include ../shared/snippets/layout-live-tile.yaml
        cards:
          - type: 'custom:button-card'
            template: header_card_no_link
            variables:
              name: LOCKS & SECURITY
            view_layout:
              grid-column: 1/-1
          - type: 'custom:button-card'
            template:
              - live_tile_with_graph
              - live_tile_with_state_unit
            entity: sensor.front_door_lock_battery_level
            name: Front Lock
            icon: mdi:door-closed-lock
            variables:
              aspect_ratio: 2
              line_width: 2
              graph_height: 80
              lower_bound: ~0
              upper_bound: ~100
            view_layout:
              grid-column: span 2
          - type: 'custom:button-card'
            template:
              - live_tile_with_graph
              - live_tile_with_state_unit
            entity: sensor.keypad_battery_level
            name: Keypad
            icon: mdi:lock-smart
            variables:
              aspect_ratio: 2
              line_width: 2
              graph_height: 80
              lower_bound: ~0
              upper_bound: ~100
