title: Maintenance
path: maintenance
icon: 'mdi:wrench'
type: 'custom:grid-layout'
layout: !include ../shared/snippets/layout-page-margin.yaml
cards:
  - type: 'custom:layout-card'
    layout_type: 'custom:grid-layout'
    layout: !include ../shared/snippets/layout-page-columns.yaml
    view_layout:
      grid-area: cc
    cards:

      - type: 'custom:layout-card'
        layout_type: 'custom:grid-layout'
        layout: !include ../shared/snippets/layout-page-title.yaml
        view_layout:
          grid-column: 1/-1
        cards:
          - type: markdown
            style: !include ../shared/snippets/style-markdown-page-title.yaml
            content: >
              # Maintenance

      # [Column] Alerts

      - type: 'custom:layout-card'
        layout_type: 'custom:grid-layout'
        layout:
          margin: -1
        cards:
          - type: 'custom:button-card'
            template: header_card_no_link
            variables:
              name: ALERTS
          - type: 'custom:layout-card'
            layout_type: 'custom:grid-layout'
            layout: !include ../shared/snippets/layout-live-tile.yaml
            cards:
              - type: 'custom:button-card'
                template: live_tile
                entity: binary_sensor.front_door_lock_replace_battery_soon
                name: Lock Batt Soon
                icon: mdi:battery-low
              - type: 'custom:button-card'
                template: live_tile
                entity: binary_sensor.front_door_lock_replace_battery_now
                name: Lock Batt Now
                icon: mdi:battery-alert
              - type: 'custom:button-card'
                template: live_tile
                entity: binary_sensor.siren_replace_battery_soon
                name: Siren Battery
                icon: mdi:battery-low
              - type: 'custom:button-card'
                template: live_tile
                entity: binary_sensor.smoke_co_detector_low_battery_level
                name: Smoke Batt
                icon: mdi:battery-low
              - type: 'custom:button-card'
                template: live_tile
                entity: binary_sensor.smoke_co_detector_replacement_required_end_of_life
                name: Detector EOL
                icon: mdi:smoke-detector-off
              - type: 'custom:button-card'
                template: live_tile
                entity: binary_sensor.laundry_room_replace_filter
                name: Replace Filter
                icon: mdi:air-filter

      # [Column] Locks & Security

      - type: 'custom:layout-card'
        layout_type: 'custom:grid-layout'
        layout:
          margin: -1
        cards:
          - type: 'custom:button-card'
            template: header_card_no_link
            variables:
              name: LOCKS & SECURITY
          - type: 'custom:layout-card'
            layout_type: 'custom:grid-layout'
            layout: !include ../shared/snippets/layout-live-tile.yaml
            cards:
              - type: 'custom:button-card'
                template: live_tile_with_unit
                entity: sensor.front_door_lock_battery_level
                name: Front Lock
                icon: mdi:door-closed-lock
                view_layout:
                  grid-column: span 2
              - type: 'custom:button-card'
                template: live_tile_with_unit
                entity: sensor.keypad_battery_level
                name: Keypad
                icon: mdi:lock-smart
                view_layout:
                  grid-column: span 2
              - type: 'custom:button-card'
                template: live_tile_with_unit
                entity: sensor.smoke_co_detector_battery_level
                name: Smoke/CO
                icon: mdi:smoke-detector
                view_layout:
                  grid-column: span 2

      # [Column] Sensors

      - type: 'custom:layout-card'
        layout_type: 'custom:grid-layout'
        layout:
          margin: -1
        cards:
          - type: 'custom:button-card'
            template: header_card_no_link
            variables:
              name: SENSORS
          - type: 'custom:layout-card'
            layout_type: 'custom:grid-layout'
            layout: !include ../shared/snippets/layout-live-tile.yaml
            cards:
              - type: 'custom:button-card'
                template: live_tile_with_unit
                entity: sensor.office_motion_battery
                name: Office Motion
                icon: mdi:motion-sensor
                view_layout:
                  grid-column: span 2
              - type: 'custom:button-card'
                template: live_tile_with_unit
                entity: sensor.office_door_sensor_battery
                name: Office Door
                icon: mdi:door
                view_layout:
                  grid-column: span 2
              - type: 'custom:button-card'
                template: live_tile_with_unit
                entity: sensor.office_window_battery
                name: Office Window
                icon: mdi:window-open
                view_layout:
                  grid-column: span 2
              - type: 'custom:button-card'
                template: live_tile_with_unit
                entity: sensor.patio_door_battery
                name: Patio Door
                icon: mdi:door-sliding
                view_layout:
                  grid-column: span 2
              - type: 'custom:button-card'
                template: live_tile_with_unit
                entity: sensor.patio_screen_door_battery
                name: Screen Door
                icon: mdi:door-sliding
                view_layout:
                  grid-column: span 2
              - type: 'custom:button-card'
                template: live_tile_with_unit
                entity: sensor.laundry_room_door_battery
                name: Laundry Door
                icon: mdi:door
                view_layout:
                  grid-column: span 2
              - type: 'custom:button-card'
                template: live_tile_with_unit
                entity: sensor.kitchen_sink_water_leak_sensor_battery
                name: Kitchen Leak
                icon: mdi:water-alert
                view_layout:
                  grid-column: span 2
              - type: 'custom:button-card'
                template: live_tile_with_unit
                entity: sensor.filter_leak_sensor_battery
                name: Filter Leak
                icon: mdi:water-alert
                view_layout:
                  grid-column: span 2

      # [Column] Shades & Remotes

      - type: 'custom:layout-card'
        layout_type: 'custom:grid-layout'
        layout:
          margin: -1
        cards:
          - type: 'custom:button-card'
            template: header_card_no_link
            variables:
              name: SHADES & REMOTES
          - type: 'custom:layout-card'
            layout_type: 'custom:grid-layout'
            layout: !include ../shared/snippets/layout-live-tile.yaml
            cards:
              - type: 'custom:button-card'
                template: live_tile_with_unit
                entity: sensor.living_room_shade_battery_level
                name: Living Room
                icon: mdi:blinds
                view_layout:
                  grid-column: span 2
              - type: 'custom:button-card'
                template: live_tile_with_unit
                entity: sensor.lobby_blinds_battery_level
                name: Lobby
                icon: mdi:blinds
                view_layout:
                  grid-column: span 2
              - type: 'custom:button-card'
                template: live_tile_with_unit
                entity: sensor.dining_room_shade_battery_level
                name: Dining Room
                icon: mdi:blinds
                view_layout:
                  grid-column: span 2
              - type: 'custom:button-card'
                template: live_tile_with_unit
                entity: sensor.office_blinds_battery_level
                name: Office Blinds
                icon: mdi:blinds
                view_layout:
                  grid-column: span 2
              - type: 'custom:button-card'
                template: live_tile_with_unit
                entity: sensor.blinds_remote_battery_level
                name: Blinds Remote
                icon: mdi:remote
                view_layout:
                  grid-column: span 2
              - type: 'custom:button-card'
                template: live_tile_with_unit
                entity: sensor.office_downlights_knob_battery
                name: Office Knob 1
                icon: mdi:knob
                view_layout:
                  grid-column: span 2
              - type: 'custom:button-card'
                template: live_tile_with_unit
                entity: sensor.office_lamp_knob_battery
                name: Office Knob 2
                icon: mdi:knob
                view_layout:
                  grid-column: span 2
              - type: 'custom:button-card'
                template: live_tile_with_unit
                entity: sensor.m7_office_battery_level
                name: M7 Office
                icon: mdi:remote
                view_layout:
                  grid-column: span 2

      # [Column] Climate Sensors

      - type: 'custom:layout-card'
        layout_type: 'custom:grid-layout'
        layout:
          margin: -1
        cards:
          - type: 'custom:button-card'
            template: header_card_no_link
            variables:
              name: CLIMATE SENSORS
          - type: 'custom:layout-card'
            layout_type: 'custom:grid-layout'
            layout: !include ../shared/snippets/layout-live-tile.yaml
            cards:
              - type: 'custom:button-card'
                template: live_tile_with_unit
                entity: sensor.server_rack_ths_battery
                name: Server Rack
                icon: mdi:thermometer
                view_layout:
                  grid-column: span 2
              - type: 'custom:button-card'
                template: live_tile_with_unit
                entity: sensor.server_room_remote_battery
                name: Server Room
                icon: mdi:thermometer
                view_layout:
                  grid-column: span 2
