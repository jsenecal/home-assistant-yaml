                view_layout:
                  grid-column: span 2
              - type: 'custom:button-card'
                template: live_tile_media_player
                entity: media_player.nesthub3ce3
                name: Display
                view_layout:
                  grid-column: span 2

      # [Column] Common Areas

      - type: vertical-stack
