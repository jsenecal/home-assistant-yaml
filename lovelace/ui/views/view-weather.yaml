title: Weather
path: weather
type: 'custom:grid-layout'
layout: !include ../shared/snippets/layout-page-margin.yaml
cards:
  - type: 'custom:layout-card'
    layout_type: 'custom:grid-layout'
    layout: !include ../shared/snippets/layout-page-columns.yaml
    view_layout:
      grid-area: cc
    cards:

      - type: 'custom:layout-card'
        layout_type: 'custom:grid-layout'
        layout: !include ../shared/snippets/layout-page-title.yaml
        view_layout:
          grid-column: 1/-1
        cards:
          - type: markdown
            style: !include ../shared/snippets/style-markdown-page-title.yaml
            content: >
              # Weather

      # [Section] Current conditions

      - type: weather-forecast
        entity: weather.weather
        forecast_type: hourly
        show_forecast: true

      - type: markdown
        content: |
          **Feels like** {{ state_attr('weather.weather', 'apparent_temperature') | round(1) }} °C

          **Wind** {{ state_attr('weather.weather', 'wind_speed') | round(0) }} km/h
          *(gusts {{ state_attr('weather.weather', 'wind_gust_speed') | round(0) }} km/h)*

          **Cloud Cover** {{ state_attr('weather.weather', 'cloud_coverage') | round(0) }} %

          **Dew point** {{ states('sensor.thermal_comfort_outdoor_dew_point') | float | round(1) }} °C

          **Visibility** {{ state_attr('weather.weather', 'visibility') | round(0) }} km

      - type: markdown
        content: |
          ## {{ states('sensor.thermal_comfort_outdoor_humidex_perception') | title }}

          Feels like **{{ states('sensor.thermal_comfort_outdoor_heat_index') | float | round(1) }} °C**

      # [Section] Charts

      - type: 'custom:apexcharts-card'
        view_layout:
          grid-column: 1/-1
        header:
          title: Hourly Forecast
          show: true
          show_states: false
        graph_span: 24h
        span:
          start: minute
          offset: '-12h'
        update_interval: 5min
        all_series_config:
          stroke_width: 2
          curve: smooth
          extend_to: now
          unit: ''
        now:
          show: true
        yaxis:
          - id: temp
            show: true
            decimals: 0
            apex_config:
              labels:
                offsetX: 24
          - id: precip
            opposite: true
            min: 0
            max: 100
            show: true
            decimals: 0
        series:
          - entity: weather.weather
            name: Temperature
            yaxis_id: temp
            unit: '°C'
            data_generator: |
              const f = await new Promise((resolve) => {
                let u;
                hass.connection.subscribeMessage(
                  (msg) => { if (u) u(); resolve(msg.forecast || []); },
                  { type: 'weather/subscribe_forecast', entity_id: 'weather.weather', forecast_type: 'hourly' }
                ).then(fn => { u = fn; });
              });
              return f.map(d => [new Date(d.datetime).getTime(), d.temperature]);
          - entity: weather.weather
            name: Rain %
            yaxis_id: precip
            type: column
            opacity: 0.3
            stroke_width: 0
            unit: '%'
            data_generator: |
              const f = await new Promise((resolve) => {
                let u;
                hass.connection.subscribeMessage(
                  (msg) => { if (u) u(); resolve(msg.forecast || []); },
                  { type: 'weather/subscribe_forecast', entity_id: 'weather.weather', forecast_type: 'hourly' }
                ).then(fn => { u = fn; });
              });
              return f.map(d => [new Date(d.datetime).getTime(), d.precipitation_probability]);
        apex_config:
          chart:
            height: 160px
          legend:
            show: false
          dataLabels:
            textAnchor: middle
            offsetX: 0
            offsetY: -6
            background:
              opacity: 0
            formatter: |
              EVAL:function(value, { seriesIndex, dataPointIndex, w }) {
                if (dataPointIndex % 2 == 0) {
                  return Math.round( value )
                } else { return '' }
              }
            style:
              fontSize: var(--h6-font-size)
              fontFamily: var(--font-stack)
              fontWeight: 500
          xaxis:
            axisBorder:
              show: false
            axisTicks:
              show: true
              color: rgba(var(--rgb-primary-text-color),.075)
              height: 40
            labels:
              show: true
              style:
                fontSize: var(--h6-font-size)
                fontFamily: var(--font-stack)
            tooltip:
              enabled: false
              offsetY: -100
              style:
                fontSize: var(--body-font-size)
                fontFamily: var(--font-stack)
          yaxis:
            labels:
              minWidth: 160
              offsetX: 50
              style:
                fontSize: var(--h6-font-size)
                fontFamily: var(--font-stack)
            tooltip:
              enabled: true
              offsetX: 40
          grid:
            strokeDashArray: 1,2
            borderColor: rgba(var(--rgb-primary-text-color),.25)
            xaxis:
              lines:
                show: true
            yaxis:
              lines:
                show: true
            padding:
              top: 0
              right: 0
              bottom: 0
              left: 0
          tooltip:
            style:
              fontSize: var(--body-font-size)
              fontFamily: var(--font-stack)
          forecastDataPoints:
            strokeWidth: 1
            dashArray: 2,2
        card_mod:
          style: >
            #graph {margin-left: -36px; margin-top: -16px;}
            .apexcharts-yaxis-label { font-family: var(--font-stack) !important;
              font-size: var(--h6-font-size) !important;
              opacity: 0.15;}
            .apexcharts-yaxis-label:nth-child(5n+1) { opacity: .5;}
            .apexcharts-xaxis-label { opacity: .5; transform: translate(0, -12px); }
            .apexcharts-xaxis-annotation-label { font-family: var(--font-stack) !important;
              font-size: var(--h6-font-size) !important; font-weight: 600 !important;}
            .apexcharts-point-annotation-label { font-family: var(--font-stack) !important;
              font-size: var(--h6-font-size) !important; font-weight: normal !important;}

      - type: 'custom:apexcharts-card'
        view_layout:
          grid-column: 1/-1
        header:
          title: 5-Day Forecast
          show: true
          show_states: false
        graph_span: 126h
        span:
          start: day
          offset: '-15h'
        now:
          show: false
        yaxis:
          - id: temp
            show: true
            decimals: 0
          - id: precip
            opposite: true
            min: 0
            max: 100
            show: false
        series:
          - entity: weather.weather
            name: High
            type: column
            yaxis_id: temp
            unit: '°C'
            data_generator: |
              const f = await new Promise((resolve) => {
                let u;
                hass.connection.subscribeMessage(
                  (msg) => { if (u) u(); resolve(msg.forecast || []); },
                  { type: 'weather/subscribe_forecast', entity_id: 'weather.weather', forecast_type: 'daily' }
                ).then(fn => { u = fn; });
              });
              return f.map(d => [new Date(d.datetime).getTime(), d.temperature]);
          - entity: weather.weather
            name: Low
            type: column
            yaxis_id: temp
            unit: '°C'
            data_generator: |
              const f = await new Promise((resolve) => {
                let u;
                hass.connection.subscribeMessage(
                  (msg) => { if (u) u(); resolve(msg.forecast || []); },
                  { type: 'weather/subscribe_forecast', entity_id: 'weather.weather', forecast_type: 'daily' }
                ).then(fn => { u = fn; });
              });
              return f.map(d => [new Date(d.datetime).getTime(), d.templow]);
          - entity: weather.weather
            name: Rain %
            type: column
            yaxis_id: precip
            opacity: 0.3
            stroke_width: 0
            unit: '%'
            data_generator: |
              const f = await new Promise((resolve) => {
                let u;
                hass.connection.subscribeMessage(
                  (msg) => { if (u) u(); resolve(msg.forecast || []); },
                  { type: 'weather/subscribe_forecast', entity_id: 'weather.weather', forecast_type: 'daily' }
                ).then(fn => { u = fn; });
              });
              return f.map(d => [new Date(d.datetime).getTime(), d.precipitation_probability]);
        apex_config:
          chart:
            height: 160px
          dataLabels:
            textAnchor: middle
            offsetX: 0
            offsetY: -6
            background:
              opacity: 0
            formatter: |
              EVAL:function(value, { seriesIndex, dataPointIndex, w }) {
                return Math.round( value )
              }
            style:
              fontSize: var(--body-font-size)
              fontFamily: var(--font-stack)
              fontWeight: var(--body-font-weight)
          grid:
            strokeDashArray: 0
            borderColor: none
            xaxis:
              lines:
                show: false
            yaxis:
              lines:
                show: false
            padding:
              top: 0
              right: 0
              bottom: 0
              left: 0
          xaxis:
            axisTicks:
              show: false
        card_mod:
          style: >
            #graph {margin-left: 0px; margin-top: -8px;}
            .apexcharts-yaxis-label { font-family: var(--font-stack) !important;
              font-size: var(--h6-font-size) !important;
              opacity: 0.15;}
            .apexcharts-xaxis-label { opacity: .5; transform: translate(0, -12px); text-transform: uppercase; }
            .apexcharts-xaxis-annotation-label { font-family: var(--font-stack) !important;
              font-size: var(--h6-font-size) !important; font-weight: 600 !important;}
            .apexcharts-point-annotation-label { font-family: var(--font-stack) !important;
              font-size: var(--h6-font-size) !important; font-weight: normal !important;}

      - type: 'custom:apexcharts-card'
        config_templates: sun_elevation
        view_layout:
          grid-column: 1/-1
